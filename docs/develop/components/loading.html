<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加载框组件示例 - 音乐工具 UI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      min-height: 100vh;
      padding: 40px 20px;
      color: #fff;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 2rem;
      font-weight: 600;
      background: linear-gradient(90deg, #f97316, #fb923c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .section {
      margin-bottom: 50px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .section-title {
      font-size: 1.1rem;
      color: #9ca3af;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .demo-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
    }

    .demo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 12px;
      min-width: 150px;
    }

    .demo-label {
      font-size: 12px;
      color: #6b7280;
    }

    /* ========== 基础旋转加载 ========== */
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner-sm {
      width: 20px;
      height: 20px;
      border-width: 2px;
    }

    .spinner-lg {
      width: 60px;
      height: 60px;
      border-width: 4px;
    }

    /* ========== 双色旋转 ========== */
    .spinner-dual {
      width: 40px;
      height: 40px;
      border: 3px solid transparent;
      border-top-color: #f97316;
      border-right-color: #fb923c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* ========== 渐变旋转 ========== */
    .spinner-gradient {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent, #f97316);
      animation: spin 1s linear infinite;
    }

    .spinner-gradient::before {
      content: '';
      display: block;
      width: 75%;
      height: 75%;
      background: #1a1a2e;
      border-radius: 50%;
      margin: 12.5%;
    }

    /* ========== 脉冲加载 ========== */
    .pulse {
      width: 40px;
      height: 40px;
      background: #f97316;
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(0.8); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    /* ========== 点阵加载 ========== */
    .dots {
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      background: #f97316;
      border-radius: 50%;
      animation: bounce 1.4s ease-in-out infinite;
    }

    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ========== 波形加载 ========== */
    .wave {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 40px;
    }

    .wave-bar {
      width: 4px;
      height: 100%;
      background: linear-gradient(180deg, #f97316, #fb923c);
      border-radius: 2px;
      animation: wave 1s ease-in-out infinite;
    }

    .wave-bar:nth-child(1) { animation-delay: 0s; height: 60%; }
    .wave-bar:nth-child(2) { animation-delay: 0.1s; height: 100%; }
    .wave-bar:nth-child(3) { animation-delay: 0.2s; height: 40%; }
    .wave-bar:nth-child(4) { animation-delay: 0.3s; height: 80%; }
    .wave-bar:nth-child(5) { animation-delay: 0.4s; height: 50%; }

    @keyframes wave {
      0%, 100% { transform: scaleY(0.5); }
      50% { transform: scaleY(1); }
    }

    /* ========== 音乐符号加载 ========== */
    .music-note {
      font-size: 32px;
      animation: musicBounce 0.6s ease-in-out infinite alternate;
    }

    @keyframes musicBounce {
      from { transform: translateY(-5px); opacity: 0.6; }
      to { transform: translateY(5px); opacity: 1; }
    }

    /* ========== 进度条加载 ========== */
    .progress-bar-container {
      width: 200px;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #f97316, #fb923c);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .progress-bar-indeterminate {
      height: 100%;
      width: 50%;
      background: linear-gradient(90deg, #f97316, #fb923c);
      border-radius: 3px;
      animation: indeterminate 1.5s ease-in-out infinite;
    }

    @keyframes indeterminate {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }

    /* ========== 玻璃态加载框 ========== */
    .loading-modal {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 32px 48px;
      text-align: center;
    }

    .loading-modal-text {
      margin-top: 16px;
      font-size: 14px;
      color: #e5e7eb;
    }

    .loading-modal-subtext {
      margin-top: 4px;
      font-size: 12px;
      color: #6b7280;
    }

    /* ========== 完整加载对话框 ========== */
    .loading-dialog {
      width: 320px;
      background: #1e1e1e;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .loading-dialog-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .loading-dialog-icon {
      width: 40px;
      height: 40px;
      background: rgba(249, 115, 22, 0.1);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loading-dialog-title {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    .loading-dialog-content {
      margin-bottom: 20px;
    }

    .loading-dialog-step {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
    }

    .loading-dialog-step-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loading-dialog-step-icon.completed {
      color: #10b981;
    }

    .loading-dialog-step-icon.active {
      color: #f97316;
    }

    .loading-dialog-step-icon.pending {
      color: #4b5563;
    }

    .loading-dialog-step-text {
      font-size: 14px;
      color: #9ca3af;
    }

    .loading-dialog-step-text.active {
      color: #fff;
    }

    .loading-dialog-progress {
      margin-top: 16px;
    }

    .loading-dialog-progress-bar {
      height: 4px;
      background: #2d2d2d;
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-dialog-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #f97316, #fb923c);
      border-radius: 2px;
    }

    .loading-dialog-progress-text {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 12px;
      color: #6b7280;
    }

    .loading-dialog-footer {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      padding: 8px 16px;
      font-size: 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #9ca3af;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }

    /* ========== 遮罩层示例 ========== */
    .overlay-demo {
      position: relative;
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #2d2d2d, #1a1a1a);
      border-radius: 12px;
      overflow: hidden;
    }

    .overlay-content {
      padding: 20px;
      color: #9ca3af;
    }

    .overlay-mask {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    .overlay-text {
      font-size: 14px;
      color: #e5e7eb;
    }

    /* ========== 唱片加载 ========== */
    .vinyl {
      width: 60px;
      height: 60px;
      background: conic-gradient(from 0deg, #1a1a1a, #333, #1a1a1a, #333, #1a1a1a, #333, #1a1a1a);
      border-radius: 50%;
      animation: spin 2s linear infinite;
      position: relative;
    }

    .vinyl::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      background: #f97316;
      border-radius: 50%;
    }

    .vinyl::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 6px;
      height: 6px;
      background: #1a1a1a;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⏳ 加载框组件示例</h1>

    <!-- 基础旋转加载 -->
    <div class="section">
      <div class="section-title">基础旋转加载</div>
      <div class="demo-grid">
        <div class="demo-item">
          <div class="spinner spinner-sm"></div>
          <span class="demo-label">小号</span>
        </div>
        <div class="demo-item">
          <div class="spinner"></div>
          <span class="demo-label">中号</span>
        </div>
        <div class="demo-item">
          <div class="spinner spinner-lg"></div>
          <span class="demo-label">大号</span>
        </div>
        <div class="demo-item">
          <div class="spinner-dual"></div>
          <span class="demo-label">双色</span>
        </div>
        <div class="demo-item">
          <div class="spinner-gradient"></div>
          <span class="demo-label">渐变</span>
        </div>
      </div>
    </div>

    <!-- 脉冲与点阵 -->
    <div class="section">
      <div class="section-title">脉冲与点阵</div>
      <div class="demo-grid">
        <div class="demo-item">
          <div class="pulse"></div>
          <span class="demo-label">脉冲</span>
        </div>
        <div class="demo-item">
          <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <span class="demo-label">点阵</span>
        </div>
        <div class="demo-item">
          <div class="wave">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
          </div>
          <span class="demo-label">波形</span>
        </div>
        <div class="demo-item">
          <div class="music-note">🎵</div>
          <span class="demo-label">音符</span>
        </div>
        <div class="demo-item">
          <div class="vinyl"></div>
          <span class="demo-label">唱片</span>
        </div>
      </div>
    </div>

    <!-- 进度条 -->
    <div class="section">
      <div class="section-title">进度条</div>
      <div class="demo-grid" style="flex-direction: column; align-items: stretch; gap: 16px;">
        <div style="display: flex; align-items: center; gap: 16px;">
          <span style="width: 80px; font-size: 12px; color: #6b7280;">0%</span>
          <div class="progress-bar-container">
            <div class="progress-bar-fill" style="width: 0%"></div>
          </div>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
          <span style="width: 80px; font-size: 12px; color: #6b7280;">30%</span>
          <div class="progress-bar-container">
            <div class="progress-bar-fill" style="width: 30%"></div>
          </div>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
          <span style="width: 80px; font-size: 12px; color: #6b7280;">60%</span>
          <div class="progress-bar-container">
            <div class="progress-bar-fill" style="width: 60%"></div>
          </div>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
          <span style="width: 80px; font-size: 12px; color: #6b7280;">100%</span>
          <div class="progress-bar-container">
            <div class="progress-bar-fill" style="width: 100%"></div>
          </div>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
          <span style="width: 80px; font-size: 12px; color: #6b7280;">不确定</span>
          <div class="progress-bar-container">
            <div class="progress-bar-indeterminate"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 玻璃态加载框 -->
    <div class="section">
      <div class="section-title">玻璃态加载框</div>
      <div class="demo-grid">
        <div class="loading-modal">
          <div class="spinner"></div>
          <div class="loading-modal-text">正在分析音频...</div>
          <div class="loading-modal-subtext">请稍候，这可能需要几秒钟</div>
        </div>
        <div class="loading-modal">
          <div class="wave">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
          </div>
          <div class="loading-modal-text">处理中...</div>
          <div class="loading-modal-subtext">已处理 1,234 个音符</div>
        </div>
      </div>
    </div>

    <!-- 完整加载对话框 -->
    <div class="section">
      <div class="section-title">完整加载对话框</div>
      <div class="demo-grid">
        <div class="loading-dialog">
          <div class="loading-dialog-header">
            <div class="loading-dialog-icon">
              <svg width="20" height="20" fill="#f97316" viewBox="0 0 20 20">
                <path d="M18 3a1 1 0 00-1.196-.98l-10 2A1 1 0 006 5v9.114A4.369 4.369 0 005 14c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V7.82l8-1.6v5.894A4.37 4.37 0 0015 12c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V3z"/>
              </svg>
            </div>
            <div class="loading-dialog-title">音频分析</div>
          </div>
          <div class="loading-dialog-content">
            <div class="loading-dialog-step">
              <div class="loading-dialog-step-icon completed">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                </svg>
              </div>
              <span class="loading-dialog-step-text active">加载音频文件</span>
            </div>
            <div class="loading-dialog-step">
              <div class="loading-dialog-step-icon completed">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                </svg>
              </div>
              <span class="loading-dialog-step-text active">AI 音高检测</span>
            </div>
            <div class="loading-dialog-step">
              <div class="loading-dialog-step-icon active">
                <div class="spinner spinner-sm" style="border-top-color: #f97316; border-color: rgba(249, 115, 22, 0.2);"></div>
              </div>
              <span class="loading-dialog-step-text active">音符后处理</span>
            </div>
            <div class="loading-dialog-step">
              <div class="loading-dialog-step-icon pending">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                  <circle cx="10" cy="10" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
                </svg>
              </div>
              <span class="loading-dialog-step-text">生成可视化</span>
            </div>
          </div>
          <div class="loading-dialog-progress">
            <div class="loading-dialog-progress-bar">
              <div class="loading-dialog-progress-fill" style="width: 75%"></div>
            </div>
            <div class="loading-dialog-progress-text">
              <span>75%</span>
              <span>预计剩余 5 秒</span>
            </div>
          </div>
          <div class="loading-dialog-footer">
            <button class="btn btn-secondary">取消</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 遮罩层示例 -->
    <div class="section">
      <div class="section-title">遮罩层示例</div>
      <div class="overlay-demo">
        <div class="overlay-content">
          <p>这是背景内容</p>
          <p>用户应该无法操作这部分</p>
          <p>当加载遮罩层显示时</p>
        </div>
        <div class="overlay-mask">
          <div class="spinner"></div>
          <div class="overlay-text">正在加载...</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
