<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>按钮组件示例 - 音乐工具 UI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      min-height: 100vh;
      padding: 40px 20px;
      color: #fff;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 2rem;
      font-weight: 600;
      background: linear-gradient(90deg, #f97316, #fb923c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .section {
      margin-bottom: 50px;
    }

    .section-title {
      font-size: 1.2rem;
      color: #9ca3af;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #2d2d2d;
    }

    .button-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
    }

    /* ========== 基础按钮 ========== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease-out;
      outline: none;
      user-select: none;
    }

    .btn:focus-visible {
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.4);
    }

    /* 主要按钮 */
    .btn-primary {
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: white;
      box-shadow: 0 2px 8px rgba(249, 115, 22, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(249, 115, 22, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
      box-shadow: 0 1px 4px rgba(249, 115, 22, 0.3);
    }

    /* 次要按钮 */
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .btn-secondary:active {
      background: rgba(255, 255, 255, 0.1);
    }

    /* 轮廓按钮 */
    .btn-outline {
      background: transparent;
      color: #f97316;
      border: 2px solid #f97316;
    }

    .btn-outline:hover {
      background: rgba(249, 115, 22, 0.1);
    }

    .btn-outline:active {
      background: rgba(249, 115, 22, 0.2);
    }

    /* 文字按钮 */
    .btn-text {
      background: transparent;
      color: #f97316;
      padding: 10px 12px;
    }

    .btn-text:hover {
      background: rgba(249, 115, 22, 0.1);
    }

    /* 禁用状态 */
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    /* ========== 图标按钮 ========== */
    .btn-icon {
      width: 40px;
      height: 40px;
      padding: 0;
      border-radius: 50%;
    }

    .btn-icon-sm {
      width: 32px;
      height: 32px;
    }

    .btn-icon-lg {
      width: 48px;
      height: 48px;
    }

    /* ========== 玻璃态按钮 ========== */
    .btn-glass {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
    }

    .btn-glass:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.3);
    }

    /* ========== 播放按钮（特殊） ========== */
    .btn-play {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: white;
      box-shadow: 0 4px 20px rgba(249, 115, 22, 0.4);
    }

    .btn-play:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 24px rgba(249, 115, 22, 0.5);
    }

    .btn-play:active {
      transform: scale(0.98);
    }

    .btn-play svg {
      width: 24px;
      height: 24px;
      margin-left: 3px;
    }

    /* ========== 按钮组 ========== */
    .btn-group {
      display: inline-flex;
    }

    .btn-group .btn {
      border-radius: 0;
    }

    .btn-group .btn:first-child {
      border-radius: 8px 0 0 8px;
    }

    .btn-group .btn:last-child {
      border-radius: 0 8px 8px 0;
    }

    .btn-group .btn:not(:last-child) {
      border-right: 1px solid rgba(0, 0, 0, 0.1);
    }

    /* ========== 加载状态按钮 ========== */
    .btn-loading {
      position: relative;
      color: transparent !important;
    }

    .btn-loading::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ========== 尺寸变体 ========== */
    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }

    .btn-lg {
      padding: 14px 28px;
      font-size: 16px;
    }

    /* ========== 颜色变体 ========== */
    .btn-success {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
    }

    .btn-danger {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
    }

    .btn-warning {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white;
    }

    /* ========== 波纹效果 ========== */
    .ripple {
      position: relative;
      overflow: hidden;
    }

    .ripple::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.4s, height 0.4s;
    }

    .ripple:active::before {
      width: 200%;
      height: 200%;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎵 按钮组件示例</h1>

    <!-- 基础按钮 -->
    <div class="section">
      <div class="section-title">基础按钮</div>
      <div class="button-grid">
        <button class="btn btn-primary">主要按钮</button>
        <button class="btn btn-secondary">次要按钮</button>
        <button class="btn btn-outline">轮廓按钮</button>
        <button class="btn btn-text">文字按钮</button>
        <button class="btn btn-primary" disabled>禁用状态</button>
      </div>
    </div>

    <!-- 尺寸变体 -->
    <div class="section">
      <div class="section-title">尺寸变体</div>
      <div class="button-grid">
        <button class="btn btn-primary btn-sm">小号按钮</button>
        <button class="btn btn-primary">中号按钮</button>
        <button class="btn btn-primary btn-lg">大号按钮</button>
      </div>
    </div>

    <!-- 颜色变体 -->
    <div class="section">
      <div class="section-title">颜色变体</div>
      <div class="button-grid">
        <button class="btn btn-primary">主要操作</button>
        <button class="btn btn-success">确认操作</button>
        <button class="btn btn-danger">删除操作</button>
        <button class="btn btn-warning">警告操作</button>
      </div>
    </div>

    <!-- 图标按钮 -->
    <div class="section">
      <div class="section-title">图标按钮</div>
      <div class="button-grid">
        <button class="btn btn-icon btn-primary">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
            <path d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z"/>
          </svg>
        </button>
        <button class="btn btn-icon btn-secondary">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd"/>
          </svg>
        </button>
        <button class="btn btn-icon btn-glass">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/>
          </svg>
        </button>
        <button class="btn btn-icon-sm btn-secondary">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 播放按钮 -->
    <div class="section">
      <div class="section-title">播放按钮（音乐应用专用）</div>
      <div class="button-grid">
        <button class="btn btn-play">
          <svg fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/>
          </svg>
        </button>
        <button class="btn btn-icon btn-secondary btn-icon-lg">
          <svg width="24" height="24" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 玻璃态按钮 -->
    <div class="section">
      <div class="section-title">玻璃态按钮（Glassmorphism）</div>
      <div class="button-grid">
        <button class="btn btn-glass">玻璃按钮</button>
        <button class="btn btn-glass">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
            <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
            <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
          </svg>
          分享
        </button>
      </div>
    </div>

    <!-- 按钮组 -->
    <div class="section">
      <div class="section-title">按钮组</div>
      <div class="button-grid">
        <div class="btn-group">
          <button class="btn btn-secondary">左</button>
          <button class="btn btn-secondary">中</button>
          <button class="btn btn-secondary">右</button>
        </div>
      </div>
    </div>

    <!-- 加载状态 -->
    <div class="section">
      <div class="section-title">加载状态</div>
      <div class="button-grid">
        <button class="btn btn-primary btn-loading">加载中</button>
        <button class="btn btn-secondary btn-loading">加载中</button>
      </div>
    </div>

    <!-- 波纹效果 -->
    <div class="section">
      <div class="section-title">波纹效果（点击查看）</div>
      <div class="button-grid">
        <button class="btn btn-primary ripple">点击试试</button>
        <button class="btn btn-secondary ripple">点击试试</button>
      </div>
    </div>
  </div>
</body>
</html>
